<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #333;
        }

        header {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            text-align: center;
            padding: 80px 20px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 25px;
            background: #ff7a18;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ff5500;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h2>My GitHub Pages Site</h2>
</header>

<div class="container">
    <h1>Welcome 🚀</h1>
    <p>This is my first static website hosted on GitHub Pages.</p>
    <a href="#" class="btn">Get Started</a>
</div>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
